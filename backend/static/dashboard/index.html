          <input id="username" placeholder="闂傚倸鍊搁崐鎼佸磹閻戣姤鍊块柨鏇楀亾妞ゎ亜鍟村畷褰掝敋閸涱垰濮洪梻浣侯潒閸曞灚鐣剁紓浣插亾濠㈣泛澶囬崑鎾荤嵁閸喖濮庡銈忓瘜閸ㄨ泛顕ｆ导鏉懳ㄩ柨鏂垮⒔椤旀洟姊洪悷鎵憼闁荤喆鍎甸幃姗€鍩￠崨顔间画? />
          <input id="password" type="password" placeholder="闂傚倸鍊搁崐宄懊归崶顒夋晪鐟滄棃寮绘繝鍥ㄦ櫜闁告粈鑳堕崝鐑芥偡濠婂啰啸闁诲繐顑呴埞鎴︽倷閺夋垹浠ч梺鎼炲妽濡炶棄鐣? />
          <button id="loginBtn">闂傚倸鍊搁崐鎼佸磹瀹勬噴褰掑炊椤掍礁鍓銈嗗姧缁犳垿鐛姀銈嗙厓閺夌偞澹嗛崝宥嗐亜閺傚灝顏紒?/button>
        </div>
      </article>

      <article class="panel">
        <h3>闂傚倸鍊搁崐鎼佸磹閻戣姤鍤勯柛鎾茬閸ㄦ繃銇勯弽顐汗闁逞屽墾缁犳挸鐣锋總绋课ㄩ柕澶涢檮琚ｉ梻鍌欑閹碱偆绮欐笟鈧畷銏＄附閸涘﹤鈧?/h3>
        <div id="statusBox" class="hint">缂傚倸鍊搁崐鎼佸磹閹间礁纾归柣鎴ｅГ閸婂潡鏌ㄩ弬鍨挃闁活厽鐟╅弻鐔封枎闄囬褍煤椤擃潿鈧礁鈽夊鍡欏弳闂佸憡娲熷褎绂掑ú顏呪拻濞达綀娅ｇ敮娑欐叏婵犲偆鐓肩€规洏鍨奸ˇ瀵哥磼椤旇偐澧︾€规洖宕灒闁兼祴鏅濆Σ鍥⒒閸屾艾鈧悂鎮ф繝鍕煓闁圭儤顨嗛弲顒傗偓骞垮劚濡稓绮绘ィ鍐╃厱闊洦娲嶉幏鈩冪箾閸喓鐭掗柡?..</div>
      </article>
    </section>
  </main>

  <script>
  const state = {
    token: localStorage.getItem('bigscreen_token') || '',
    baseUrl: localStorage.getItem('bigscreen_base_url') || 'http://127.0.0.1:8000',
    ws: null,
    polling: null,
    fullscreen: false,
    rotateEnabled: true,
    rotateTimer: null,
    rotateIndex: 0,
    focusPanels: ['trendPanel', 'alertPanel', 'devicePanel', 'systemPanel', 'zonePanel', 'weatherRiskPanel', 'zoneHeatPanel', 'deviceHealthPanel'],
    series: { temperature: [], humidity: [], soil: [], labels: [] },
  };

  const el = (id) => document.getElementById(id);

  function setStatus(text, type = 'ok') { el('statusBox').innerHTML = `<span class="${type}">${text}</span>`; }
  function setConn(text, type) { el('connState').textContent = text; el('connState').className = type; }
  function setWs(text, type) { el('wsState').textContent = text; el('wsState').className = type; }

  function authHeaders(json = false) {
    const h = {};
    if (state.token) h['Authorization'] = `Bearer ${state.token}`;
    if (json) h['Content-Type'] = 'application/json';
    return h;
  }

  async function request(path, options = {}) {
    const base = state.baseUrl.replace(/\/$/, '');
    const res = await fetch(`${base}${path}`, {
      ...options,
      headers: { ...(options.headers || {}) },
    });
    const txt = await res.text();
    let data = {};
    try { data = txt ? JSON.parse(txt) : {}; } catch { data = { raw: txt }; }
    if (!res.ok) {
      const msg = data.detail || data.message || JSON.stringify(data);
      throw new Error(`${res.status} ${msg}`);
    }
    return data;
  }

  function toPoints(arr, w = 860, h = 220, pad = 16) {
    if (!arr.length) return '';
    const min = Math.min(...arr);
    const max = Math.max(...arr);
    const span = max - min || 1;
    return arr.map((v, i) => {
      const x = pad + (i * (w - pad * 2)) / Math.max(1, arr.length - 1);
      const y = h - pad - ((v - min) / span) * (h - pad * 2);
      return `${x},${y}`;
    }).join(' ');
  }

  function renderChart() {
    const svg = el('trendChart');
    const t = state.series.temperature;
    const h = state.series.humidity;
    const s = state.series.soil;
    if (!t.length) {
      svg.innerHTML = '<text x="20" y="36" fill="#80b5ca" font-size="14">No trend data</text>';
      return;
    }
    const grid = [20, 60, 100, 140, 180, 220]
      .map((y) => `<line x1="0" y1="${y}" x2="900" y2="${y}" stroke="rgba(128,181,202,.18)" />`).join('');
    svg.innerHTML = `
      <g>${grid}</g>
      <polyline points="${toPoints(t)}" fill="none" stroke="#59dcff" stroke-width="3" stroke-linecap="round" />
      <polyline points="${toPoints(h)}" fill="none" stroke="#42f8b8" stroke-width="3" stroke-linecap="round" />
      <polyline points="${toPoints(s)}" fill="none" stroke="#ffbe44" stroke-width="3" stroke-linecap="round" />
    `;
  }

  function appendRealtimePoint(data) {
    if (!data) return;
    const push = (arr, v) => { arr.push(Number(v || 0)); if (arr.length > 24) arr.shift(); };
    push(state.series.temperature, data.temperature);
    push(state.series.humidity, data.humidity);
    push(state.series.soil, data.soil_moisture);
    state.series.labels.push(String(data.created_at || '').slice(11, 16));
    if (state.series.labels.length > 24) state.series.labels.shift();
    renderChart();

    el('kpiTemp').textContent = Number(data.temperature || 0).toFixed(1);
    el('kpiHum').textContent = Number(data.humidity || 0).toFixed(1);
    el('kpiSoil').textContent = Number(data.soil_moisture || 0).toFixed(1);
  }

  function renderSystem(data) {
    const latest = data.latest_sensor || {};
    const rows = [
      ['Device Total', data.device_total],
      ['Device Online', data.device_online],
      ['Alerts Today', data.alert_today],
      ['Realtime Temp', latest.temperature != null ? `${Number(latest.temperature).toFixed(1)}C` : '--'],
      ['Realtime Humidity', latest.humidity != null ? `${Number(latest.humidity).toFixed(1)}%` : '--'],
    ];
    el('systemList').innerHTML = rows.map(([k, v]) => `<div class="item"><div class="item-top"><span>${k}</span><b>${v ?? '--'}</b></div></div>`).join('');
  }

  function renderDevices(list) {
    const html = (list || []).slice(0, 14).map((d) => {
      const online = Number(d.status) === 1;
      const pill = `<span class="status-pill ${online ? 'online' : 'offline'}">${online ? 'ON' : 'OFF'}</span>`;
      return `<tr><td>${d.device_name}</td><td>${d.device_type}</td><td>${pill}</td><td>${JSON.stringify(d.params || {}).slice(0, 32)}</td></tr>`;
    }).join('');
    el('deviceTable').innerHTML = html || '<tr><td colspan="4">No devices</td></tr>';
  }

  function renderZones(zones, devices) {
    const allDevices = devices || [];
    const onlineTotal = allDevices.filter((d) => Number(d.status) === 1).length;
    el('zoneList').innerHTML = (zones || []).map((z) => `
      <div class="item">
        <div class="item-top">
          <b>${z.zone_name}</b>
          <span class="status-pill ${Number(z.is_active) === 1 ? 'online' : 'offline'}">${Number(z.is_active) === 1 ? 'active' : 'disabled'}</span>
        </div>
        <div class="item-sub">devices ${z.device_count} · online total ${onlineTotal}</div>
      </div>
    `).join('') || '<div class="hint">No zones</div>';
  }

  function renderAlerts(logs) {
    const list = logs || [];
    if (!list.length) {
      el('alertList').innerHTML = '<div class="hint">No alerts</div>';
      return;
    }
    el('alertList').innerHTML = list.slice(0, 12).map((a) => {
      const t = String(a.created_at || '').replace('T', ' ').slice(0, 19);
      const level = a.alert_type === 'high' ? 'danger' : 'warn';
      return `<div class="item"><div class="item-top"><b>${a.metric_name}</b><span class="${level}">${a.alert_type}</span></div><div class="item-sub">value ${a.metric_value} · ${t}</div></div>`;
    }).join('');
    el('kpiAlert').textContent = String(list.filter((x) => Number(x.is_read) === 0).length);
  }

  function evaluateWeatherRisk(point) {
    const t = Number(point.temperature || 0);
    const h = Number(point.humidity || 0);
    if (t >= 34 || t <= 6 || h >= 88 || h <= 25) return 'high';
    if (t >= 30 || t <= 10 || h >= 80 || h <= 35) return 'mid';
    return 'low';
  }

  function renderWeatherRisk(points, suggestions) {
    const strip = el('weatherRiskStrip');
    const text = el('weatherRiskText');
    const list = (points || []).slice(0, 24);
    if (!list.length) {
      strip.innerHTML = '';
      text.textContent = 'No forecast data';
      return;
    }

    strip.innerHTML = list.map((p) => {
      const level = evaluateWeatherRisk(p);
      const hour = String(p.time || '').slice(11, 13) || '--';
      const cls = level === 'high' ? 'risk-high' : (level === 'mid' ? 'risk-mid' : 'risk-low');
      return `<div class="risk-cell ${cls}">${hour}</div>`;
    }).join('');

    const high = list.filter((p) => evaluateWeatherRisk(p) === 'high').length;
    const mid = list.filter((p) => evaluateWeatherRisk(p) === 'mid').length;
    text.textContent = `High ${high}h · Medium ${mid}h · ${(suggestions || [])[0] || 'No suggestion'}`;
  }

  async function refreshWeatherRisk() {
    try {
      const data = await request('/api/ai/weather-forecast?hours=24', { headers: authHeaders() });
      renderWeatherRisk(data.points || [], data.suggestions || []);
    } catch (err) {
      el('weatherRiskText').textContent = `Weather risk unavailable: ${err.message}`;
      el('weatherRiskStrip').innerHTML = '';
    }
  }

  async function refreshZoneHeatmap(zones) {
    const out = el('zoneHeatList');
    const zoneList = zones || [];
    if (!zoneList.length) {
      out.innerHTML = '<div class="hint">No zones</div>';
      return;
    }

    try {
      const details = await Promise.all(zoneList.map(async (z) => {
        const rows = await request(`/api/zone/${z.id}/devices`, { headers: authHeaders() });
        const total = rows.length;
        const online = rows.filter((d) => Number(d.status) === 1).length;
        const actuatorOn = rows.filter((d) => Number(d.status) === 1 && ['pump', 'fan', 'valve', 'spray'].includes(String(d.device_type))).length;
        const onlineRatio = total ? online / total : 0;
        const loadRatio = total ? actuatorOn / total : 0;
        const score = Math.max(0, Math.min(100, Math.round((1 - onlineRatio) * 70 + loadRatio * 30)));
        return { name: z.zone_name, score, online, total, load: actuatorOn };
      }));

      const color = (score) => score >= 70 ? '#ff6a7d' : (score >= 40 ? '#ffbe44' : '#42f8b8');
      out.innerHTML = details.sort((a, b) => b.score - a.score).map((x) => `
        <div class="heat-row">
          <span>${x.name}</span>
          <div class="heat-bar"><div class="heat-fill" style="width:${x.score}%;background:${color(x.score)}"></div></div>
          <span>${x.score}</span>
        </div>
        <div class="hint">online ${x.online}/${x.total} · active actuator ${x.load}</div>
      `).join('');
    } catch (err) {
      out.innerHTML = `<div class="hint danger">Zone heatmap unavailable: ${err.message}</div>`;
    }
  }

  async function refreshDeviceHealthRank() {
    const out = el('deviceHealthRank');
    try {
      const rows = await request('/api/device/health', { headers: authHeaders() });
      const sorted = (rows || []).slice().sort((a, b) => Number(a.health_score || 0) - Number(b.health_score || 0)).slice(0, 6);
      if (!sorted.length) {
        out.innerHTML = '<div class="hint">No health data</div>';
        return;
      }

      const cls = (s) => s < 50 ? 'danger' : (s < 75 ? 'warn' : 'ok');
      out.innerHTML = sorted.map((d) => `
        <div class="health-item">
          <div class="health-top"><b>${d.device_name}</b><span class="${cls(Number(d.health_score || 0))}">score ${d.health_score}</span></div>
          <div class="item-sub">type ${d.device_type} · errors ${d.error_count} · offline ${d.offline_count}</div>
        </div>
      `).join('');
    } catch (err) {
      out.innerHTML = `<div class="hint danger">Device health unavailable: ${err.message}</div>`;
    }
  }

  function setClock() { el('nowTime').textContent = new Date().toLocaleTimeString('zh-CN', { hour12: false }); }

  function clearSpotlight() {
    state.focusPanels.forEach((id) => {
      const panel = el(id);
      if (panel) panel.classList.remove('spotlight');
    });
  }

  function runSpotlight() {
    if (!state.rotateEnabled) return;
    clearSpotlight();
    const id = state.focusPanels[state.rotateIndex % state.focusPanels.length];
    const panel = el(id);
    if (panel) panel.classList.add('spotlight');
    state.rotateIndex += 1;
  }

  function startRotate() {
    if (state.rotateTimer) clearInterval(state.rotateTimer);
    runSpotlight();
    state.rotateTimer = setInterval(runSpotlight, 3500);
  }

  function setRotate(enabled) {
    state.rotateEnabled = enabled;
    el('rotateBtn').textContent = `Rotate: ${enabled ? 'ON' : 'OFF'}`;
    if (enabled) startRotate();
    else {
      if (state.rotateTimer) clearInterval(state.rotateTimer);
      state.rotateTimer = null;
      clearSpotlight();
    }
  }

  async function toggleFullscreen() {
    const root = document.documentElement;
    if (!document.fullscreenElement) {
      await root.requestFullscreen();
      state.fullscreen = true;
    } else {
      await document.exitFullscreen();
      state.fullscreen = false;
    }
    el('fullscreenBtn').textContent = state.fullscreen ? 'Exit Fullscreen' : 'Fullscreen';
    document.querySelector('.screen').classList.toggle('full-mode', state.fullscreen);
  }

  async function login() {
    const username = el('username').value.trim();
    const password = el('password').value;
    if (!username || !password) {
      setStatus('Please input username and password', 'warn');
      return;
    }

    try {
      const data = await request('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      state.token = data.access_token || '';
      localStorage.setItem('bigscreen_token', state.token);
      el('tokenInput').value = state.token;
      setStatus(`Login success: ${data.username}`, 'ok');
      await refreshAll();
      connectWs();
    } catch (err) {
      setStatus(`Login failed: ${err.message}`, 'danger');
    }
  }

  async function refreshTrend() {
    const data = await request('/api/sensor/history?page=1&page_size=24', { headers: authHeaders() });
    const items = (data.items || []).slice().reverse();
    state.series.temperature = items.map((x) => Number(x.temperature || 0));
    state.series.humidity = items.map((x) => Number(x.humidity || 0));
    state.series.soil = items.map((x) => Number(x.soil_moisture || 0));
    state.series.labels = items.map((x) => String(x.created_at || '').slice(11, 16));
    renderChart();

    if (items.length) {
      const last = items[items.length - 1];
      el('kpiTemp').textContent = Number(last.temperature || 0).toFixed(1);
      el('kpiHum').textContent = Number(last.humidity || 0).toFixed(1);
      el('kpiSoil').textContent = Number(last.soil_moisture || 0).toFixed(1);
    }
  }

  async function refreshAll() {
    try {
      const [overview, devices, alerts, waterToday, zones] = await Promise.all([
        request('/api/system/overview', { headers: authHeaders() }),
        request('/api/device/list', { headers: authHeaders() }),
        request('/api/alert/logs?page=1&page_size=20', { headers: authHeaders() }),
        request('/api/water/today', { headers: authHeaders() }),
        request('/api/zone', { headers: authHeaders() }),
      ]);

      renderSystem(overview);
      renderDevices(devices);
      renderZones(zones, devices);
      renderAlerts(alerts.items || []);

      el('kpiWater').textContent = Number(waterToday.total_liters || 0).toFixed(1);
      el('kpiWaterDesc').textContent = `L · ${waterToday.date || ''}`;

      await Promise.all([
        refreshTrend(),
        refreshWeatherRisk(),
        refreshZoneHeatmap(zones),
        refreshDeviceHealthRank(),
      ]);

      setConn('Connected', 'ok');
      setStatus('Dashboard refreshed', 'ok');
    } catch (err) {
      setConn('Failed', 'danger');
      setStatus(`Refresh failed: ${err.message}`, 'danger');
    }
  }

  function connectWs() {
    if (!state.token) {
      setWs('Unauthorized', 'warn');
      return;
    }
    if (state.ws) {
      state.ws.close();
      state.ws = null;
    }

    try {
      const base = state.baseUrl.replace(/^http/, 'ws').replace(/\/$/, '');
      const ws = new WebSocket(`${base}/ws/realtime?token=${encodeURIComponent(state.token)}`);

      ws.onopen = () => setWs('Connected', 'ok');
      ws.onclose = () => {
        setWs('Disconnected', 'warn');
        setTimeout(connectWs, 3000);
      };
      ws.onerror = () => setWs('Error', 'danger');
      ws.onmessage = (evt) => {
        try {
          const data = JSON.parse(evt.data || '{}');
          if (data.type === 'sensor_data') appendRealtimePoint(data.data);
          if (data.type === 'alert') refreshAll();
          if (data.type === 'device_status') refreshAll();
        } catch {
        }
      };

      state.ws = ws;
    } catch {
      setWs('Unavailable', 'warn');
    }
  }

  function startPolling() {
    if (state.polling) clearInterval(state.polling);
    state.polling = setInterval(refreshAll, 5000);
    el('refreshTick').textContent = '5s';
  }

  function bindEvents() {
    el('baseUrl').value = state.baseUrl;
    el('tokenInput').value = state.token;

    el('saveTokenBtn').onclick = () => {
      state.baseUrl = el('baseUrl').value.trim() || 'http://127.0.0.1:8000';
      state.token = el('tokenInput').value.trim();
      localStorage.setItem('bigscreen_base_url', state.baseUrl);
      localStorage.setItem('bigscreen_token', state.token);
      setStatus('Config saved', 'ok');
      refreshAll();
      connectWs();
    };

    el('loginBtn').onclick = login;
    el('refreshBtn').onclick = refreshAll;
    el('fullscreenBtn').onclick = toggleFullscreen;
    el('rotateBtn').onclick = () => setRotate(!state.rotateEnabled);

    document.addEventListener('keydown', (evt) => {
      if (evt.key.toLowerCase() === 'f') toggleFullscreen();
      if (evt.key.toLowerCase() === 'p') setRotate(!state.rotateEnabled);
    });

    document.addEventListener('fullscreenchange', () => {
      state.fullscreen = Boolean(document.fullscreenElement);
      el('fullscreenBtn').textContent = state.fullscreen ? 'Exit Fullscreen' : 'Fullscreen';
      document.querySelector('.screen').classList.toggle('full-mode', state.fullscreen);
    });
  }

  async function init() {
    bindEvents();
    setClock();
    setInterval(setClock, 1000);
    await refreshAll();
    connectWs();
    startPolling();
    startRotate();
  }

  init();
</script>
